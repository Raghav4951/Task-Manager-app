openapi: 3.0.0
info:
  title: Task Manager API
  version: 1.0.0
  description: REST API with JWT authentication and role-based access

servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  example: user
      responses:
        201:
          description: User registered successfully

  /api/v1/auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful

  /api/v1/auth/me:
    get:
      summary: Get current logged-in user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Current user fetched successfully

  /api/v1/tasks:
    get:
      summary: Get logged-in user's tasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Tasks fetched successfully
    post:
      summary: Create a task
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                priority:
                  type: string
                dueDate:
                  type: string
      responses:
        201:
          description: Task created successfully

  /api/v1/tasks/{id}:
    get:
      summary: Get a single task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Single task fetched
    put:
      summary: Update a task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task updated successfully
    delete:
      summary: Delete a task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task deleted successfully

  /api/v1/admin/users:
    get:
      summary: Get all users (admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: All users fetched successfully

  /api/v1/admin/tasks:
    get:
      summary: Get all tasks (admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: All tasks fetched successfully